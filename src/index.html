    <!-- Inline Preloader CSS to avoid render blocking -->
    <style>
        .preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #ffffff;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 1;
            visibility: visible;
            transition: opacity 0.5s ease-out, visibility 0.5s ease-out;
        }

        .preloader.preloader--hidden {
            opacity: 0;
            visibility: hidden;
        }

        .preloader__logo {
            width: 80px;
            height: 80px;
            position: relative;
        }

        .preloader__logo svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .preloader__path--bg {
            fill: #F1F5FF;
        }

        .preloader__path--fill {
            fill: #4469E0;
            clip-path: inset(100% 0 0 0);
            animation: preloaderFill 1.5s ease-in-out infinite alternate;
        }

        @keyframes preloaderFill {
            from {
                clip-path: inset(100% 0 0 0);
            }

            to {
                clip-path: inset(0 0 0 0);
            }
        }
    </style>
